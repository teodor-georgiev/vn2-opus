name: VN2 audit

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vn2-audit.yml"
      - "scripts/audit_competition_rules.py"
      - "scripts/validate_submissions.py"
      - "scripts/run_final_audit.py"
      - "best_winner.json"
      - "simulation.py"
      - "submissions/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: smoke validates mechanics/submissions; full runs canonical final policy + generates submissions"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
      python-version:
        description: "Python version"
        required: true
        default: "3.11"
        type: choice
        options:
          - "3.10"
          - "3.11"

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      AUDIT_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'smoke' }}
      AUDIT_PYTHON_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.python-version || '3.11' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.AUDIT_PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy scipy scikit-learn numba lightgbm catboost mlforecast statsforecast joblib optuna

      - name: Show environment
        run: |
          echo "AUDIT_MODE=${AUDIT_MODE}"
          python --version
          python - <<'PY'
          import importlib
          for name in ["pandas", "numpy", "lightgbm", "catboost", "mlforecast", "statsforecast", "numba"]:
              mod = importlib.import_module(name)
              print(f"{name}={getattr(mod, '__version__', 'unknown')}")
          PY

      - name: Audit competition mechanics
        run: python scripts/audit_competition_rules.py

      - name: Validate committed submissions if present
        run: |
          if [ -d submissions ] && [ -f submissions/round_1.csv ]; then
            python scripts/validate_submissions.py --submission-dir submissions
          else
            echo "No committed submissions/round_1.csv found; skipping committed submission validation."
          fi

      - name: Run canonical final policy and generate submissions
        if: ${{ env.AUDIT_MODE == 'full' }}
        run: |
          mkdir -p audit_artifacts
          python scripts/run_final_audit.py --write-submissions --submission-dir submissions | tee audit_artifacts/run_final_audit.log
          python scripts/validate_submissions.py --submission-dir submissions | tee audit_artifacts/validate_submissions.log

      - name: Capture git and artifact hashes
        if: ${{ env.AUDIT_MODE == 'full' }}
        run: |
          git rev-parse HEAD | tee audit_artifacts/git_sha.txt
          sha256sum submissions/round_*.csv | tee audit_artifacts/submission_sha256.txt

      - name: Upload audit artifacts
        if: ${{ env.AUDIT_MODE == 'full' }}
        uses: actions/upload-artifact@v4
        with:
          name: vn2-audit-${{ github.sha }}
          path: |
            audit_artifacts/
            submissions/round_*.csv
          if-no-files-found: error
